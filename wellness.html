<!-- wellness.html -->

<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    Wellness | Botanoria
  </title>

  <link
    rel="stylesheet"
    href="style.css"
  >

</head>

<body data-category="wellness">

  <!-- CART DRAWER -->
  <div id="cart-drawer" class="drawer hidden">

    <div class="drawer-content">

      <div class="drawer-top">

        <h3>Your Cart</h3>

        <span onclick="closeDrawer()">
          ✕
        </span>

      </div>

      <div id="drawer-items"></div>

      <div class="drawer-footer">

        <h3>
          Total ₹<span id="drawer-total">0</span>
        </h3>

        <button
          class="checkout-btn"
          onclick="goToCart()"
        >
          View Cart
        </button>

      </div>

    </div>

  </div>

  <!-- OVERLAY -->
  <div
    id="overlay"
    class="overlay hidden"
    onclick="closeVariantModal(); closeDrawer();"
  ></div>

  <!-- VARIANT MODAL -->
  <div id="variant-modal" class="variant-modal hidden">

    <div class="variant-box">

      <button
        class="variant-close"
        onclick="closeVariantModal()"
      >
        ×
      </button>

      <img
        id="variant-image"
        class="variant-image"
        src=""
      >

      <h2
        id="variant-title"
        class="variant-title"
      ></h2>

      <p
        id="variant-price"
        class="variant-price"
      ></p>

      <div
        id="variant-options"
        class="variant-options"
      ></div>

      <button
        class="variant-add-btn"
        onclick="addVariantToCart()"
      >
        Add To Cart
      </button>

      <button
        class="variant-cart-btn"
        onclick="goToCart()"
      >
        Go To Cart
      </button>

    </div>

  </div>

  <!-- HERO -->
  <section class="category-hero wellness-hero">

    <div class="category-hero-content">

      <p>
        BOTANORIA WELLNESS
      </p>

      <h1>
        Wellness Rituals ✨
      </h1>

      <span>

        Slow living rituals crafted for mindful,
        balanced and nourishing everyday wellness.

      </span>

    </div>

  </section>

  <!-- QUOTE -->
  <section class="wellness-editorial">

    <blockquote>

      “Wellness begins in the rituals
      we quietly return to every day.”

    </blockquote>

  </section>

  <!-- PRODUCTS -->
  <section class="category-products-section">

    <div
      class="products-grid"
      id="products-grid"
    ></div>

  </section>

  <!-- SCRIPTS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <script src="supabase.js"></script>

  <script src="script.js"></script>

  <script src="category.js"></script>

</body>

</html>
