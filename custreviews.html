<!DOCTYPE html>
<html>
<head>

  <title>
    Customer Reviews | Botanoria
  </title>

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <link
    rel="stylesheet"
    href="style.css"
  >

</head>

<body>

    <div class="botanoria-loader" id="botanoriaLoader">

  <div class="loader-glow"></div>

  <img
    src="images/logo.png"
    class="loader-logo"
  >

  <h1 class="loader-text">

   Real Customer Reviews

  </h1>

</div>

<section class="reviews-page">

  <div class="reviews-header">

    <span>
      BOTANORIA REVIEWS ✦
    </span>

    <h1>
      Real Customer Reviews
    </h1>

  </div>

  <div
    id="reviews-container"
    class="reviews-grid"
  ></div>

</section>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="supabase.js"></script>

<script>

async function loadReviews(){

  const {
    data,
    error
  } = await supabaseClient
    .from("customer_reviews")
    .select("*")
    .order(
      "created_at",
      {
        ascending:false
      }
    );

  if(error){

    console.log(error);

    return;
  }

  const container =
    document.getElementById(
      "reviews-container"
    );

  container.innerHTML = "";

  data.forEach(review => {

    const stars =
      "⭐".repeat(review.rating);

    container.innerHTML += `

      <div class="review-card">

        <div class="review-images">

          ${
  review.image1
  ?

  `
  <img
    src="${review.image1}"
    onclick="openImageModal('${review.image1}')"
  >
  `

  : ""
}

${
  review.image2
  ?

  `
  <img
    src="${review.image2}"
    onclick="openImageModal('${review.image2}')"
  >
  `

  : ""
}

${
  review.image3
  ?

  `
  <img
    src="${review.image3}"
    onclick="openImageModal('${review.image3}')"
  >
  `

  : ""
}

        </div>

        ${
          review.video_url
          ?

          `

          <video
            controls
            class="review-video"
          >

            <source
              src="${review.video_url}"
            >

          </video>

          `

          : ""
        }

        <div class="review-content">

          <h3>
            ${review.customer_name}
          </h3>

          <div class="review-stars">

            ${stars}

          </div>

          <p>

            ${review.review_text}

          </p>

        </div>

      </div>
    `;
  });
}

loadReviews();
function openImageModal(src){

  const modal =
    document.getElementById(
      "image-modal"
    );

  document.getElementById(
    "modal-image"
  ).src = src;

  modal.style.display = "flex";

  /* PUSH HISTORY */

  history.pushState(
    {
      modalOpen:true
    },
    ""
  );
}

function closeImageModal(){

  document.getElementById(
    "image-modal"
  ).style.display = "none";
}

/* BACK BUTTON CLOSE */

window.addEventListener(
  "popstate",
  function(){

    const modal =
      document.getElementById(
        "image-modal"
      );

    if(
      modal.style.display === "flex"
    ){

      modal.style.display = "none";
    }
  }
);

</script>
<!-- IMAGE ZOOM MODAL -->

<div
  id="image-modal"
  class="image-modal"
  onclick="closeImageModal()"
>

  <img
    id="modal-image"
    class="modal-image"
  >

</div>

<footer class="footer">

  <p class="footer-text">
    Crafted with nature, care & timeless rituals 🌿
  </p>

  <a
    href="https://instagram.com/botanoriasoaps"
    target="_blank"
    class="footer-instagram"
  >

    <svg
      xmlns="http://www.w3.org/2000/svg"
      width="18"
      height="18"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
    >

      <rect
        x="2"
        y="2"
        width="20"
        height="20"
        rx="5"
        ry="5"
      ></rect>

      <path
        d="M16 11.37a4 4 0 1 1-7.75 1.06
        4 4 0 0 1 7.75-1.06z"
      ></path>

      <line
        x1="17.5"
        y1="6.5"
        x2="17.51"
        y2="6.5"
      ></line>

    </svg>

    Follow Botanoria

  </a>

</footer>
</body>
</html>
