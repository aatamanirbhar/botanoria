<!DOCTYPE html>
<html>
<head>
  <title>BOTANORIA</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<div id="cart-drawer" class="drawer hidden">
  <div class="drawer-content">

    <div class="drawer-top">
      <h3>Your Cart</h3>
      <span onclick="closeDrawer()">✕</span>
    </div>

    <div id="drawer-items"></div>

    <div class="drawer-footer">
      <h3>Total ₹<span id="drawer-total">0</span></h3>

      <button class="checkout-btn" onclick="goToCart()">
        View Cart
      </button>
    </div>

  </div>
</div>
<div class="shipping-strip">
  <!-- FREE DELIVERY ABOVE ₹1000 -->
</div>
<div class="shipping-strip coupon-strip"></div>
<body>
<div class="app">
  <!-- sab content yahan daal -->

<div class="header">
  <div class="logo">BOTANORIA</div>
  <a href="cart.html">🛒</a>
</div>

<div class="container">
  <h1 style="font-size:28px;">Pure Herbal Care</h1>
<p style="color:gray;">
  Crafted with nature. No chemicals. Just results.
</p>

  <div id="products"></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="supabase.js"></script>


<div id="variant-modal" class="variant-modal hidden">

  <div class="variant-box">

    <button
      class="variant-close"
      onclick="closeVariantModal()"
    >
      ×
    </button>

    <img
      id="variant-image"
      class="variant-image"
      src=""
    >

    <h2
      id="variant-title"
      class="variant-title"
    ></h2>

    <p
      id="variant-price"
      class="variant-price"
    ></p>

    <div
      id="variant-options"
      class="variant-options"
    ></div>

    <button
      class="variant-add-btn"
      onclick="addVariantToCart()"
    >
      Add To Cart
    </button>

    <button
      class="variant-cart-btn"
      onclick="goToCart()"
    >
      Go To Cart
    </button>

  </div>

</div>
<script src="script.js"></script>
</div>
</body>
</html>
