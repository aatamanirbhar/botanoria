<!-- soap.html -->

<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    Skin Care | Botanoria
  </title>

  <link
    rel="stylesheet"
    href="style.css"
  >

</head>

<body data-category="soap">

  <!-- CART DRAWER -->

  <div id="cart-drawer" class="drawer hidden">

    <div class="drawer-content">

      <div class="drawer-top">

        <h3>Your Cart</h3>

        <span onclick="closeDrawer()">
          ✕
        </span>

      </div>

      <div id="drawer-items"></div>

      <div class="drawer-footer">

        <h3>
          Total ₹<span id="drawer-total">0</span>
        </h3>

        <button
          class="checkout-btn"
          onclick="goToCart()"
        >
          View Cart
        </button>

      </div>

    </div>

  </div>

  <!-- OVERLAY -->

  <div
    id="overlay"
    class="overlay hidden"
    onclick="closeVariantModal(); closeDrawer();"
  ></div>

  <!-- VARIANT MODAL -->

  <div id="variant-modal" class="variant-modal hidden">

    <div class="variant-box">

      <button
        class="variant-close"
        onclick="closeVariantModal()"
      >
        ×
      </button>

      <img
        id="variant-image"
        class="variant-image"
        src=""
      >

      <h2
        id="variant-title"
        class="variant-title"
      ></h2>

      <p
        id="variant-price"
        class="variant-price"
      ></p>

      <div
        id="variant-options"
        class="variant-options"
      ></div>

      <button
        class="variant-add-btn"
        onclick="addVariantToCart()"
      >
        Add To Cart
      </button>

      <button
        class="variant-cart-btn"
        onclick="goToCart()"
      >
        Go To Cart
      </button>

    </div>

  </div>

  <!-- HERO -->

  <section class="soap-editorial-hero">

    <div class="soap-overlay"></div>

    <div class="soap-content">

   

  


    </div>

  </section>

  <!-- 3D SOAP SHOWCASE -->

  <section class="soap-3d-section">

    <div class="soap-intro">

      <span>
        NEW LAUNCHED ✦
      </span>

      <h2>
        Glow Ritual Soap
      </h2>

      <p>

        A luxurious botanical cleansing
        ritual crafted for radiant,
        nourished glowing skin.

      </p>

      <button
        onclick="heroShopNow('YOUR_PRODUCT_ID')"
      >
        Shop Ritual
      </button>

    </div>

    <div class="soap-stage">

      <div class="soap-aura"></div>

      <img
        src="images/soap.png"
        class="rotating-soap"
      >

      <div class="orbit orbit-1">

        <span>
          Saffron ✦ Brightens
        </span>

      </div>

      <div class="orbit orbit-2">

        <span>
          Goat Milk ✦ Hydrates
        </span>

      </div>

      <div class="orbit orbit-3">

        <span>
          Turmeric ✦ Glows
        </span>

      </div>

    </div>

  </section>

  <!-- PRODUCTS -->

  <section class="category-products-section">

    <div
      class="products-grid"
      id="products-grid"
    ></div>

  </section>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <script src="supabase.js"></script>

  <script src="script.js"></script>

  <script src="category.js"></script>

</body>

</html>
